server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: ${USER_DB_URL:jdbc:mysql://localhost:3306/municipal_users?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${USER_DB_USERNAME:root}
    password: ${USER_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    preferIpAddress: true

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret}
    expiration-minutes: 120