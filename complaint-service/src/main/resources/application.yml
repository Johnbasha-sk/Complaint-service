server:
  port: 8082

spring:
  application:
    name: complaint-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/municipal_base
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

jwt:
  secret: mySecretKey
  expiration: 86400000

logging:
  level:
    com.municipality.complaintservice: DEBUG