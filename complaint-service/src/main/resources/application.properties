server.port=8082
spring.application.name=complaint-service

# MySQL datasource
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/municipal_base?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Security - JWT Resource Server
# Option A: JWK Set URI published by User Service (preferred if available)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI:}
# Option B: Provide an RSA public key directly
spring.security.oauth2.resourceserver.jwt.public-key-location=${JWT_PUBLIC_KEY_LOCATION:}

# Roles claim key within JWT (default 'roles'); values should be like ["CITIZEN","STAFF","ADMIN"]
security.jwt.roles-claim=${JWT_ROLES_CLAIM:roles}